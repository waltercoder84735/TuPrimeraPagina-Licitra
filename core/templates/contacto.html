{% extends 'base.html' %}

{% block titulo %}Contacto - FinanzasClaras{% endblock %}

{% block contenido %}
    <h1>Contacto</h1>
    <p>Completá el formulario y me comunico a la brevedad.</p>

    {% if exito %}
        <p>¡Mensaje enviado correctamente! Me contacto pronto.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar</button>
    </form>
{% endblock %}
