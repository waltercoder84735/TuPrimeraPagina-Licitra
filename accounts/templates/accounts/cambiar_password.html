{% extends 'base.html' %}

{% block titulo %}Cambiar Contraseña - Finanzas Claras{% endblock %}

{% block contenido %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Cambiar contraseña</h4>
                {% if exito %}
                    <div class="alert alert-success">
                        ¡Contraseña cambiada correctamente!
                    </div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Cambiar contraseña</button>
                </form>
                <p class="text-center mt-3"><a href="{% url 'perfil' %}">Volver al perfil</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
