{% extends 'base.html' %}

{% block titulo %}Registro - Finanzas Claras{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-4">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Crear cuenta</h4>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Registrarse</button>
                </form>
                <p class="text-center mt-3">¿Ya tenés cuenta? <a href="{% url 'login' %}">Iniciá sesión</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
