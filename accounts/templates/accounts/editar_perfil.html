{% extends 'base.html' %}

{% block titulo %}Editar Perfil - Finanzas Claras{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card mt-4">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Editar perfil</h4>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-dark w-100">Guardar cambios</button>
                </form>
                <p class="text-center mt-3"><a href="{% url 'perfil' %}">Volver al perfil</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
